<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2V - TikTok Summit</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app-nav"></div>
  <div class="page">
    <div class="page-header">
      <h1>🎬 P2V 商品转视频</h1>
      <p>从商品信息自动生成营销短视频，AI 驱动的内容生产管线</p>
    </div>
    <div class="grid">
      <div class="card"><div class="stat">0</div><h3>今日生成</h3><p>已生成的视频数</p></div>
      <div class="card"><div class="stat">0</div><h3>商品库</h3><p>已录入的商品</p></div>
      <div class="card"><div class="stat">0</div><h3>模板</h3><p>可用的视频模板</p></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>任务ID</th><th>商品名称</th><th>模板</th><th>状态</th><th>创建时间</th></tr></thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center;color:rgba(255,255,255,0.2);padding:40px;">暂无任务，功能开发中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>if (requireAuth('p2v')) injectNav('p2v');</script>
</body>
</html>
