<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据分析 - TikTok Summit</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { padding: 20px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
    .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #25f4ee, #fe2c55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab { padding: 8px 18px; border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.5); background: none; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.2s; }
    .tab:hover { color: #fff; border-color: rgba(255,255,255,0.15); }
    .tab.active { color: #fff; background: rgba(37,244,238,0.12); border-color: rgba(37,244,238,0.3); }
    .range-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    .range-btn { padding: 5px 14px; border-radius: 6px; font-size: 12px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
    .range-btn.active { color: #25f4ee; border-color: #25f4ee; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .bar-label { width: 120px; font-size: 13px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 24px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #25f4ee, #fe2c55); display: flex; align-items: center; padding-left: 8px; font-size: 11px; color: #fff; font-weight: 600; min-width: 30px; transition: width 0.4s ease; }
    .timeline { max-height: 500px; overflow-y: auto; }
    .tl-item { display: flex; gap: 16px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .tl-time { width: 70px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
    .tl-user { width: 80px; color: #25f4ee; flex-shrink: 0; }
    .tl-event { color: rgba(255,255,255,0.6); flex: 1; }
    .tl-page { color: rgba(255,255,255,0.4); }
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .refresh-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; background: rgba(37,244,238,0.1); border: 1px solid rgba(37,244,238,0.2); color: #25f4ee; cursor: pointer; }
    /* Visitor tracking styles */
    .visitor-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .visitor-table th { text-align: left; padding: 8px 12px; color: rgba(255,255,255,0.4); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 12px; }
    .visitor-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); }
    .visitor-table tr:hover { background: rgba(255,255,255,0.03); }
    .ip-link { color: #25f4ee; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
    .ip-link:hover { text-decoration-style: solid; }
    .ip-detail-panel { background: rgba(37,244,238,0.04); border: 1px solid rgba(37,244,238,0.15); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .ip-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .ip-detail-header h3 { margin: 0; font-size: 16px; color: #25f4ee; }
    .ip-detail-close { background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .ip-detail-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .ip-meta { display: flex; gap: 20px; margin-bottom: 16px; font-size: 13px; color: rgba(255,255,255,0.5); }
    .ip-meta span { display: flex; gap: 4px; }
    .ip-meta .val { color: rgba(255,255,255,0.8); }
    .geo-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(254,44,85,0.12); color: #fe2c55; font-size: 11px; }
    .visitor-filter { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .visitor-filter input { padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #fff; font-size: 13px; outline: none; width: 200px; }
    .visitor-filter input::placeholder { color: rgba(255,255,255,0.25); }
    .visitor-filter input:focus { border-color: rgba(37,244,238,0.3); }
    .summary-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; background: rgba(254,44,85,0.1); border: 1px solid rgba(254,44,85,0.2); color: #fe2c55; cursor: pointer; }
    .summary-btn.active { background: rgba(254,44,85,0.2); border-color: #fe2c55; }
  </style>
</head>
<body>
  <div id="app-nav"></div>
  <div class="page">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:start;">
      <div>
        <h1>📈 数据分析</h1>
        <p>追踪用户行为、页面访问与使用路径</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="last-update" style="font-size:11px;color:rgba(255,255,255,0.3);"></span>
        <button class="refresh-btn" onclick="loadData()">刷新</button>
      </div>
    </div>

    <!-- Time range -->
    <div class="range-bar">
      <button class="range-btn active" data-range="1" onclick="setRange(1,this)">今天</button>
      <button class="range-btn" data-range="7" onclick="setRange(7,this)">7天</button>
      <button class="range-btn" data-range="30" onclick="setRange(30,this)">30天</button>
    </div>

    <!-- Overview stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="label">页面访问量 (PV)</div><div class="value" id="s-pv">—</div></div>
      <div class="stat-card"><div class="label">独立用户 (UV)</div><div class="value" id="s-uv">—</div></div>
      <div class="stat-card"><div class="label">会话数</div><div class="value" id="s-sessions">—</div></div>
      <div class="stat-card"><div class="label">平均停留时长</div><div class="value" id="s-duration">—</div><div class="sub">秒/页</div></div>
      <div class="stat-card"><div class="label">独立IP</div><div class="value" id="s-ips">—</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab active" onclick="showTab('pages',this)">页面热度</button>
      <button class="tab" onclick="showTab('users',this)">用户分析</button>
      <button class="tab" onclick="showTab('paths',this)">访问路径</button>
      <button class="tab" onclick="showTab('visitors',this)">访客追踪</button>
      <button class="tab" onclick="showTab('timeline',this)">实时动态</button>
    </div>

    <!-- Tab content -->
    <div id="tab-pages" class="card">
      <div class="section-title">页面访问量排行</div>
      <div id="page-bars"></div>
      <div style="margin-top:24px;">
        <div class="section-title">页面平均停留时长 (秒)</div>
        <div id="duration-bars"></div>
      </div>
    </div>

    <div id="tab-users" class="card" style="display:none;">
      <div class="section-title">用户活跃度排行</div>
      <div id="user-bars"></div>
      <div style="margin-top:24px;">
        <div class="section-title">角色分布</div>
        <div id="role-bars"></div>
      </div>
    </div>

    <div id="tab-paths" class="card" style="display:none;">
      <div class="section-title">页面流转 (从 → 到)</div>
      <div class="table-wrap" style="margin-top:0;">
        <table>
          <thead><tr><th>来源页</th><th>目标页</th><th>次数</th><th>占比</th></tr></thead>
          <tbody id="path-table"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-visitors" class="card" style="display:none;">
      <div class="visitor-filter">
        <input type="text" id="ip-search" placeholder="搜索 IP 地址..." oninput="filterVisitors(this.value)">
        <button class="summary-btn" id="summary-toggle" onclick="toggleSummary()">综合页面偏好</button>
      </div>
      <div id="ip-detail-area"></div>
      <div id="visitor-summary" style="display:none;margin-bottom:20px;"></div>
      <div class="section-title">访客列表 <span id="visitor-count" style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.3);"></span></div>
      <div style="overflow-x:auto;">
        <table class="visitor-table">
          <thead><tr><th>IP 地址</th><th>位置</th><th>访问量</th><th>会话数</th><th>最后访问</th><th>最爱页面</th></tr></thead>
          <tbody id="visitor-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-timeline" class="card" style="display:none;">
      <div class="section-title">最近事件</div>
      <div class="timeline" id="timeline-list"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    // Auth disabled
    {
      injectNav('analytics');
      let currentRange = 1;
      let analyticsData = null;

      function setRange(days, btn) {
        currentRange = days;
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadData();
      }

      function showTab(tab, btn) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = '';
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }

      async function loadData() {
        try {
          const res = await fetch('/api/analytics/query?range=' + currentRange + 'd');
          if (!res.ok) throw new Error('API error');
          analyticsData = await res.json();
          render(analyticsData);
          document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString();
        } catch (e) {
          console.error(e);
          document.getElementById('s-pv').textContent = '—';
          document.getElementById('s-uv').textContent = '—';
          document.getElementById('s-sessions').textContent = '—';
          document.getElementById('s-duration').textContent = '—';
        }
      }

      function render(d) {
        // Stats
        document.getElementById('s-pv').textContent = d.overview.pv.toLocaleString();
        document.getElementById('s-uv').textContent = d.overview.uv;
        document.getElementById('s-sessions').textContent = d.overview.sessions;
        document.getElementById('s-duration').textContent = d.overview.avgDuration;
        document.getElementById('s-ips').textContent = d.overview.ips || 0;

        // Page bars
        renderBars('page-bars', d.pages, v => v.views + ' 次');
        // Duration bars
        renderBars('duration-bars', d.pageDurations, v => v.views + 's');
        // User bars
        renderBars('user-bars', d.users, v => v.views + ' 次');
        // Role bars
        renderBars('role-bars', d.roles, v => v.views + ' 人');
        // Paths
        renderPaths(d.paths);
        // Visitors
        renderVisitors(d.visitors);
        // Timeline
        renderTimeline(d.timeline);
      }

      function renderBars(containerId, items, labelFn) {
        const container = document.getElementById(containerId);
        if (!items || !items.length) {
          container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无数据</div>';
          return;
        }
        const max = Math.max(...items.map(i => i.views));
        container.innerHTML = items.map(item => {
          const pct = max > 0 ? Math.max(5, (item.views / max) * 100) : 5;
          return `<div class="bar-row">
            <div class="bar-label" title="${item.name}">${item.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${labelFn(item)}</div></div>
          </div>`;
        }).join('');
      }

      function renderPaths(paths) {
        const tbody = document.getElementById('path-table');
        if (!paths || !paths.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">暂无数据</td></tr>';
          return;
        }
        const total = paths.reduce((s, p) => s + p.count, 0);
        tbody.innerHTML = paths.map(p => {
          const pct = total > 0 ? ((p.count / total) * 100).toFixed(1) : 0;
          return `<tr><td>${p.from}</td><td>${p.to}</td><td>${p.count}</td><td>${pct}%</td></tr>`;
        }).join('');
      }

      function renderTimeline(events) {
        const list = document.getElementById('timeline-list');
        if (!events || !events.length) {
          list.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无数据</div>';
          return;
        }
        list.innerHTML = events.map(e => {
          const t = new Date(e.ts);
          const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const label = e.event === 'page_view' ? '访问' : e.event === 'page_leave' ? '离开' : e.event === 'click' ? '点击' : e.event;
          const detail = e.meta && e.meta.target ? e.meta.target : (e.meta && e.meta.duration ? e.meta.duration + 's' : '');
          return `<div class="tl-item">
            <div class="tl-time">${time}</div>
            <div class="tl-user">${e.user}</div>
            <div class="tl-event">${label} ${detail}</div>
            <div class="tl-page">${e.page}</div>
          </div>`;
        }).join('');
      }

      // ── Visitor tracking ──
      let allVisitors = [];
      let geoData = {};
      let summaryActive = false;

      function renderVisitors(visitors) {
        allVisitors = visitors || [];
        const tbody = document.getElementById('visitor-tbody');
        document.getElementById('visitor-count').textContent = `(${allVisitors.length} 个IP)`;
        document.getElementById('s-ips').textContent = analyticsData.overview.ips || allVisitors.length;

        if (!allVisitors.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">暂无访客数据</td></tr>';
          return;
        }

        renderVisitorRows(allVisitors);
        // Fetch geo for top IPs
        const ips = allVisitors.slice(0, 50).map(v => v.ip).filter(ip => ip && ip !== 'unknown');
        if (ips.length) fetchGeo(ips);
      }

      function renderVisitorRows(visitors) {
        const tbody = document.getElementById('visitor-tbody');
        tbody.innerHTML = visitors.map(v => {
          const geo = geoData[v.ip];
          const loc = geo ? [geo.city, geo.region, geo.country].filter(Boolean).join(', ') : '<span style="color:rgba(255,255,255,0.2)">查询中...</span>';
          const topPage = v.topPages && v.topPages[0] ? v.topPages[0].name + ' (' + v.topPages[0].views + ')' : '—';
          const lastSeen = v.lastSeen ? new Date(v.lastSeen).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
          return `<tr>
            <td><span class="ip-link" onclick="showIpDetail('${v.ip}')">${v.ip}</span></td>
            <td>${loc}</td>
            <td>${v.pv}</td>
            <td>${v.sessions}</td>
            <td>${lastSeen}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${topPage}">${topPage}</td>
          </tr>`;
        }).join('');
      }

      async function fetchGeo(ips) {
        try {
          const res = await fetch('/api/analytics/geo?ips=' + ips.join(','));
          const data = await res.json();
          Object.assign(geoData, data);
          renderVisitorRows(allVisitors.filter(v => !document.getElementById('ip-search').value || v.ip.includes(document.getElementById('ip-search').value)));
        } catch (e) { console.error('Geo lookup failed', e); }
      }

      function filterVisitors(query) {
        const q = query.trim().toLowerCase();
        if (!q) { renderVisitorRows(allVisitors); return; }
        const filtered = allVisitors.filter(v => {
          if (v.ip.includes(q)) return true;
          const geo = geoData[v.ip];
          if (geo && [geo.country, geo.region, geo.city, geo.isp].join(' ').toLowerCase().includes(q)) return true;
          return false;
        });
        renderVisitorRows(filtered);
      }

      async function showIpDetail(ip) {
        const area = document.getElementById('ip-detail-area');
        area.innerHTML = '<div class="ip-detail-panel"><div style="color:rgba(255,255,255,0.4);">加载中...</div></div>';
        try {
          const res = await fetch('/api/analytics/query?range=' + currentRange + 'd&ip=' + encodeURIComponent(ip));
          const d = await res.json();
          if (d.error) { area.innerHTML = ''; return; }
          const geo = geoData[ip];
          const locStr = geo ? [geo.city, geo.region, geo.country].filter(Boolean).join(', ') : '';
          const ispStr = geo && geo.isp ? geo.isp : '';
          const lastSeen = d.lastSeen ? new Date(d.lastSeen).toLocaleString() : '—';

          let html = `<div class="ip-detail-panel">
            <div class="ip-detail-header">
              <h3>${ip} ${locStr ? '<span class="geo-tag">' + locStr + '</span>' : ''}</h3>
              <button class="ip-detail-close" onclick="document.getElementById('ip-detail-area').innerHTML=''">关闭</button>
            </div>
            <div class="ip-meta">
              <span>访问量: <span class="val">${d.pv}</span></span>
              <span>会话: <span class="val">${d.sessions}</span></span>
              <span>最后访问: <span class="val">${lastSeen}</span></span>
              ${ispStr ? '<span>ISP: <span class="val">' + ispStr + '</span></span>' : ''}
            </div>
            <div class="section-title">页面偏好</div>`;

          if (d.pages && d.pages.length) {
            const max = d.pages[0].views;
            html += d.pages.map(p => {
              const pct = Math.max(5, (p.views / max) * 100);
              return `<div class="bar-row"><div class="bar-label" title="${p.name}">${p.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%">${p.views} 次</div></div></div>`;
            }).join('');
          } else {
            html += '<div style="color:rgba(255,255,255,0.3);font-size:13px;">无页面数据</div>';
          }

          if (d.pageDurations && d.pageDurations.length) {
            html += '<div class="section-title" style="margin-top:16px;">页面停留时长 (秒)</div>';
            const maxD = d.pageDurations[0].views;
            html += d.pageDurations.map(p => {
              const pct = Math.max(5, (p.views / maxD) * 100);
              return `<div class="bar-row"><div class="bar-label" title="${p.name}">${p.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#fe2c55,#25f4ee);">${p.views}s</div></div></div>`;
            }).join('');
          }

          // Timeline for this IP
          if (d.timeline && d.timeline.length) {
            html += '<div class="section-title" style="margin-top:16px;">最近活动</div><div class="timeline" style="max-height:250px;">';
            html += d.timeline.slice(0, 30).map(e => {
              const t = new Date(e.ts);
              const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              const label = e.event === 'page_view' ? '访问' : e.event === 'page_leave' ? '离开' : '点击';
              const detail = e.meta && e.meta.target ? e.meta.target : (e.meta && e.meta.duration ? e.meta.duration + 's' : '');
              return `<div class="tl-item"><div class="tl-time">${time}</div><div class="tl-user">${e.user}</div><div class="tl-event">${label} ${detail}</div><div class="tl-page">${e.page}</div></div>`;
            }).join('');
            html += '</div>';
          }

          html += '</div>';
          area.innerHTML = html;
        } catch (e) {
          area.innerHTML = '';
          console.error(e);
        }
      }

      function toggleSummary() {
        summaryActive = !summaryActive;
        const btn = document.getElementById('summary-toggle');
        const panel = document.getElementById('visitor-summary');
        btn.classList.toggle('active', summaryActive);

        if (!summaryActive) { panel.style.display = 'none'; return; }

        // Aggregate page preferences across all (or filtered) visitors
        const searchVal = document.getElementById('ip-search').value.trim().toLowerCase();
        const targets = searchVal
          ? allVisitors.filter(v => v.ip.includes(searchVal) || (geoData[v.ip] && [geoData[v.ip].country, geoData[v.ip].region, geoData[v.ip].city].join(' ').toLowerCase().includes(searchVal)))
          : allVisitors;

        const pageTotals = {};
        targets.forEach(v => {
          (v.topPages || []).forEach(p => { pageTotals[p.name] = (pageTotals[p.name] || 0) + p.views; });
        });
        const sorted = Object.entries(pageTotals).sort((a, b) => b[1] - a[1]);

        if (!sorted.length) {
          panel.innerHTML = '<div class="ip-detail-panel"><div style="color:rgba(255,255,255,0.3);">无数据</div></div>';
          panel.style.display = '';
          return;
        }

        const max = sorted[0][1];
        let html = `<div class="ip-detail-panel">
          <div class="section-title">综合页面偏好 (${targets.length} 个IP)</div>`;
        html += sorted.map(([name, views]) => {
          const pct = Math.max(5, (views / max) * 100);
          return `<div class="bar-row"><div class="bar-label" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#fe2c55,#a855f7);">${views} 次</div></div></div>`;
        }).join('');
        html += '</div>';
        panel.innerHTML = html;
        panel.style.display = '';
      }

      // Auto refresh every 60s
      loadData();
      setInterval(loadData, 60000);
    }
  </script>
</body>
</html>
