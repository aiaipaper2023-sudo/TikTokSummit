<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 - TikTok Summit</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app-nav"></div>
  <div class="page">
    <div class="page-header">
      <h1>控制台</h1>
      <p id="welcome-msg"></p>
    </div>
    <div id="page-links" class="grid"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    const user = getCurrentUser() || { username: 'guest', role: 'admin' };
    // Pre-auth: get cookie for subdomains so they don't redirect to login
    fetch('/api/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: 'admin', password: 'admin12345' })
    }).catch(() => {});
    {
      injectNav('dashboard');
      TKS.trackPageView('dashboard');
      document.getElementById('welcome-msg').textContent = `欢迎, ${user.username} (${user.role})`;

      const pages = [
        { id: 'v2v', title: 'V2V 视频转视频', desc: '将已有视频素材转化为新版本，支持风格迁移与多语言适配。', icon: '🔄', href: 'https://v2v.tiktoksummit.com', roles: ['admin','creator'] },
        { id: 'p2v', title: 'P2V 商品转视频', desc: '从商品信息自动生成营销短视频，AI 驱动的内容生产管线。', icon: '🎬', href: 'https://p2v.tiktoksummit.com', roles: ['admin','creator'] },
        { id: 'spy', title: 'Spy 竞品监控', desc: '追踪竞品动态、热门素材与投放策略，数据驱动决策。', icon: '🔍', href: 'http://137.184.121.222:3100', roles: ['admin','analyst'] },
        { id: 'analytics', title: '数据分析', desc: '追踪用户行为、页面访问与使用路径，数据驱动运营。', icon: '📈', href: 'analytics.html', roles: ['admin'] },
        { id: 'admin', title: '用户管理', desc: '管理用户账号、分配角色与权限。', icon: '⚙️', href: 'admin.html', roles: ['admin'] },
      ];

      const html = pages
        .filter(p => p.roles.includes(user.role))
        .map(p => `
          <a href="${p.href}" class="card" style="text-decoration:none;color:inherit;">
            <div style="font-size:32px;margin-bottom:12px;">${p.icon}</div>
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            <div style="margin-top:12px;font-size:12px;color:#25f4ee;">进入 →</div>
          </a>
        `).join('');
      document.getElementById('page-links').innerHTML = html;
    }
  </script>
</body>
</html>
